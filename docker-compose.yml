version: "3.8"

services:

##################################
#    Core Database Containers    #
##################################
  # Redis in-memory key-value store
  redis:
    image: ${REDIS_IMAGE}
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "/conf/redis.conf"]
    volumes:
      - ${CONFIG_DIR}/redis:/conf:ro
      - ${DATA_DIR}/redis:/data:rw
    restart: unless-stopped

  # MariaDB relational database
  mariadb:
    image: ${MARIADB_IMAGE}
    container_name: mariadb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    volumes:
      - ${DATA_DIR}/mariadb:/var/lib/mysql:rw
    restart: unless-stopped

  # MongoDB document database  
  mongodb:
    image: ${MONGODB_IMAGE}
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${ROOT_PASSWORD}
    volumes:
      - ${DATA_DIR}/mongodb:/data/db:rw
    restart: unless-stopped


###############################
#    Monitoring Containers    #
###############################
  # Prometheus metrics collector
  # Before starting, create the folder and set permissions:
  #   mkdir -p ./data/prometheus_data
  #   sudo chown -R 65534:65534 /data/prometheus_data
  # Prometheus often runs as UID 65534 (nobody).  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DATA_DIR}/prometheus_data:/prometheus
    restart: unless-stopped
  #
  # http://localhost:9090/targets
  #      

  # Grafana visualization dashboard
  # Before starting, create the folder and set permissions:
  #   mkdir -p ./data/grafana_data
  #   sudo chown -R 472:472 ./data/grafana_data
  # Grafana runs inside the container as user ID 472.
  # Setting ownership ensures the container can read/write safely.
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    user: "472"   # safer then "0" which is root.    
    ports:
      - "80:3000"
    volumes:
      - ${DATA_DIR}/grafana_data:/var/lib/grafana
    restart: unless-stopped
  #
  # http://localhost:80/
  #

  # Redis metrics exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${ROOT_PASSWORD}
    restart: unless-stopped

  # MongoDB metrics exporter
  mongodb-exporter:
    image: percona/mongodb_exporter:0.49
    container_name: mongodb-exporter
    command: 
      - '--compatible-mode'
      - '--collect-all'
    environment:
      - MONGODB_URI=mongodb://root:${ROOT_PASSWORD}@mongodb:27017
    restart: unless-stopped

  # MariaDB/MySQL metrics exporter
  mariadb-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mariadb-exporter
    command:
      - '--mysqld.address=mariadb:3306'
      - '--mysqld.username=root'
    environment:
      - MYSQLD_EXPORTER_PASSWORD=${ROOT_PASSWORD}      
    restart: unless-stopped


##############################################
# Notes for Persistence and Security
##############################################

# 1. External mapped folders are used instead of named volumes.
#    This makes data transparent, easy to back up, and portable.
#    The bottom-level "volumes:" section can be removed entirely.
# 2. Always create the data folders before starting containers.
#    Use ${DATA_DIR} for flexibility. Example:
#      mkdir -p ${DATA_DIR}/redis
#      mkdir -p ${DATA_DIR}/mariadb
#      mkdir -p ${DATA_DIR}/mongodb
#      mkdir -p ${DATA_DIR}/prometheus_data
#      mkdir -p ${DATA_DIR}/grafana_data
# 3. Set correct ownership for each folder to match the container’s internal user:
#    Redis (UID 999):
#      sudo chown -R 999:999 ${DATA_DIR}/redis
#    MariaDB (UID 999):
#      sudo chown -R 999:999 ${DATA_DIR}/mariadb
#    MongoDB (UID 999):
#      sudo chown -R 999:999 ${DATA_DIR}/mongodb
#    Prometheus (UID 65534, "nobody"):
#      sudo chown -R 65534:65534 ${DATA_DIR}/prometheus_data
#    Grafana (UID 472):
#      sudo chown -R 472:472 ${DATA_DIR}/grafana_data
# 4. Pin image versions instead of using "latest" for stability.
#    Example:
#      image: grafana/grafana-oss:11.2.0
#      image: prom/prometheus:v2.53.0
#      image: mariadb:11.4.2
#      image: mongo:7.0.12
#      image: redis:7.2.5
# 5. Keep sensitive values (like ROOT_PASSWORD) in your .env file.
#    This keeps your Compose file clean and avoids leaking secrets.
# 6. Exporter containers (redis-exporter, mongodb-exporter, mariadb-exporter)
#    do not need persistent storage. They only expose metrics.
